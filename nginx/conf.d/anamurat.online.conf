upstream anareiki-web {
  server web:3000;
}

server {
  listen 80;
  server_name anamurat.online www.anamurat.online;
  server_tokens off;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name anamurat.online www.anamurat.online;
  server_tokens off;

  ssl_certificate /etc/nginx/ssl/live/anamurat.online/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/live/anamurat.online/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  client_max_body_size 500M;

  location / {
    proxy_pass http://anareiki-web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  location /_next/static {
    proxy_pass http://anareiki-web;
    expires 365d;
    access_log off;
    add_header Cache-Control "public, immutable";
  }

  location /uploads {
    proxy_pass http://anareiki-web;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
