server {
    server_name anamurat.online www.anamurat.online;
    server_tokens off;

    client_max_body_size 500M;

    location / {
        proxy_pass http://127.0.0.1:31008;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/anamurat.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anamurat.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.anamurat.online) {
        return 301 https://$host$request_uri;
    }

    if ($host = anamurat.online) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name anamurat.online www.anamurat.online;
    return 404;
}
